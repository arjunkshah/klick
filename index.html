<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var k = localStorage.getItem("klick-theme");
          var t =
            k === "dark" ? "dark" : k === "light" ? "light" : window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <link rel="icon" href="/klick-favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Klick is the AI productivity and orchestration workspace for teams—Linear structure, Notion docs, and Slack-speed collaboration for the agentic era."
    />
    <title>Klick — AI productivity &amp; orchestration for fast-moving teams</title>
    <link
      rel="preload"
      href="/fonts/cursor-gothic-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/jjannon-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/berkeley-mono-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
